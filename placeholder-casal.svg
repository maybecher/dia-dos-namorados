<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Definições de Gradientes e Filtros -->
  <defs>
    <!-- Gradiente do Céu (Pôr do Sol Nostálgico/Laranja e Roxo) -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0b2e" />
      <stop offset="40%" stop-color="#4c1c5c" />
      <stop offset="70%" stop-color="#96284b" />
      <stop offset="90%" stop-color="#e65c40" />
      <stop offset="100%" stop-color="#fcd0a1" />
    </linearGradient>
    
    <!-- Gradiente do Mar -->
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c1035" />
      <stop offset="30%" stop-color="#1f0924" />
      <stop offset="100%" stop-color="#0a030c" />
    </linearGradient>
    
    <!-- Gradiente do Sol -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8db" />
      <stop offset="50%" stop-color="#ffd085" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff7b54" stop-opacity="0" />
    </radialGradient>

    <!-- Filtro de Brilho Sutil -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fundo / Céu -->
  <rect width="800" height="600" fill="url(#skyGrad)" />

  <!-- Sol Poente -->
  <circle cx="400" cy="410" r="140" fill="url(#sunGrad)" />
  <circle cx="400" cy="410" r="60" fill="#fffaf0" opacity="0.9" filter="url(#glow)" />

  <!-- Nuvens Estilizadas Anos 2000 (Vibe Skate/Grafite leve) -->
  <path d="M -50 250 C 100 200, 200 280, 350 230 C 500 180, 650 240, 850 180 L 850 400 L -50 400 Z" fill="#96284b" opacity="0.25" />
  <path d="M -50 290 C 120 250, 250 310, 420 260 C 590 210, 700 280, 850 240 L 850 400 L -50 400 Z" fill="#e65c40" opacity="0.15" />

  <!-- Gaivotas no Céu (Símbolo de Liberdade e Tatuagem Old School) -->
  <g fill="none" stroke="#2c1035" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <path d="M 250 120 Q 260 110 270 120 Q 280 110 290 120" />
    <path d="M 520 95 Q 528 87 536 95 Q 544 87 552 95" transform="scale(0.8) translate(100, 30)" />
    <path d="M 120 180 Q 126 172 132 180 Q 138 172 144 180" transform="scale(1.2) translate(-20, -30)" />
  </g>

  <!-- Mar com Reflexo do Sol -->
  <rect x="0" y="400" width="800" height="200" fill="url(#seaGrad)" />
  
  <!-- Brilho/Reflexo na Água -->
  <ellipse cx="400" cy="420" rx="200" ry="8" fill="#ffd085" opacity="0.5" filter="url(#glow)" />
  <ellipse cx="400" cy="445" rx="140" ry="5" fill="#e65c40" opacity="0.3" filter="url(#glow)" />
  <ellipse cx="400" cy="475" rx="80" ry="3" fill="#ffd085" opacity="0.2" />

  <!-- Silhueta da Praia / Areia (Curva Orgânica) -->
  <path d="M -50 600 Q 150 430 400 480 Q 650 530 850 420 L 850 600 Z" fill="#0c0512" />

  <!-- Elemento de Skate Culture (Silhueta de Skate fincado na areia ou deitado) -->
  <!-- Skate inclinado na areia -->
  <g transform="translate(620, 420) rotate(22)" fill="#07030a">
    <!-- Prancha de Skate -->
    <rect x="-12" y="-70" width="24" height="140" rx="10" />
    <!-- Rodinhas e Eixos -->
    <rect x="-18" y="-45" width="36" height="6" rx="2" />
    <circle cx="-16" cy="-42" r="5" />
    <circle cx="16" cy="-42" r="5" />
    
    <rect x="-18" y="35" width="36" height="6" rx="2" />
    <circle cx="-16" cy="38" r="5" />
    <circle cx="16" cy="38" r="5" />
  </g>

  <!-- Silhueta do Casal Abraçado no Centro-Esquerdo -->
  <g transform="translate(320, 315)" fill="#07030a">
    <!-- Corpo da Pessoa da Esquerda (Levemente inclinada, abraçada) -->
    <path d="M 42 165 C 38 120, 42 90, 52 80 C 60 70, 72 70, 76 80 C 80 90, 78 120, 74 165 Z" />
    <circle cx="62" cy="55" r="14" />
    
    <!-- Corpo da Pessoa da Direita (Segurando a outra, abraço íntimo) -->
    <path d="M 68 165 C 64 110, 72 85, 84 75 C 92 65, 104 68, 108 78 C 112 90, 108 120, 102 165 Z" />
    <circle cx="98" cy="50" r="13" />
    
    <!-- Braços envolvendo no abraço -->
    <path d="M 62 80 Q 82 85 96 76" stroke="#07030a" stroke-width="8" stroke-linecap="round" fill="none" />
    <path d="M 98 78 Q 78 88 56 84" stroke="#07030a" stroke-width="7" stroke-linecap="round" fill="none" />
  </g>

  <!-- Pássaros Old School de Tatuagem nos Cantos (Decoração clássica CBJR/Skate) -->
  <!-- Andorinha Esquerda (Estilo Old School Tattoo) -->
  <g transform="translate(80, 80) scale(0.65) rotate(-15)" fill="#ffffff" stroke="#bd081c" stroke-width="2">
    <path d="M 0 0 C 20 -20, 60 -10, 80 10 C 60 20, 40 10, 30 20 C 40 40, 30 70, 10 80 C 10 50, 0 30, -20 20 C -40 20, -60 10, -50 0 C -30 0, -10 -10, 0 0 Z" fill="#07030a" />
    <path d="M 30 20 Q 55 55 70 70 M 30 20 Q 10 45 -5 60" stroke="#bd081c" stroke-width="2.5" fill="none" />
  </g>
  
  <!-- Andorinha Direita (Estilo Old School Tattoo) -->
  <g transform="translate(720, 70) scale(0.65) scale(-1, 1) rotate(-15)" fill="#ffffff" stroke="#bd081c" stroke-width="2">
    <path d="M 0 0 C 20 -20, 60 -10, 80 10 C 60 20, 40 10, 30 20 C 40 40, 30 70, 10 80 C 10 50, 0 30, -20 20 C -40 20, -60 10, -50 0 C -30 0, -10 -10, 0 0 Z" fill="#07030a" />
    <path d="M 30 20 Q 55 55 70 70 M 30 20 Q 10 45 -5 60" stroke="#bd081c" stroke-width="2.5" fill="none" />
  </g>

  <!-- Efeito de Estrelas / Pontos de Luz Suaves no Céu Superior -->
  <circle cx="180" cy="50" r="1.5" fill="#fff" opacity="0.5" />
  <circle cx="210" cy="80" r="1" fill="#fff" opacity="0.3" />
  <circle cx="100" cy="140" r="2" fill="#ffd085" opacity="0.4" />
  <circle cx="680" cy="120" r="1.5" fill="#fff" opacity="0.6" />
  <circle cx="610" cy="40" r="2" fill="#fff" opacity="0.5" />
  <circle cx="490" cy="70" r="1" fill="#ffd085" opacity="0.4" />
</svg>
